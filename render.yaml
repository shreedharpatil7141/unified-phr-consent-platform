services:
  - type: web
    name: unified-phr-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /docs
    envVars:
      - key: DB_NAME
        value: phr_app
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "10080"
      - key: OPENAI_MODEL
        value: gpt-5-mini
      - key: MONGO_URI
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  - type: static
    name: unified-phr-doctor-dashboard
    rootDir: doctor-dashboard
    buildCommand: npm ci && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_BASE_URL
        value: https://unified-phr-backend.onrender.com
